AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy Python Lambda from S3

Parameters:
  LambdaFunctionName:
    Type: String
    Default: download-file-1

  S3Bucket:
    Type: String
    Description: S3 bucket containing lambda zip
    Default: iata-data-lake-demo

  S3Key:
    Type: String
    Description: S3 key of lambda zip file
    Default: lambda_zip_file/download-file-1.zip

  LambdaHandler:
    Type: String
    Default: lambda_function.lambda_handler

  LambdaRuntime:
    Type: String
    Default: python3.12

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${LambdaFunctionName}-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

      Policies:
        - PolicyName: LambdaS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::iata-data-lake-demo
                  - arn:aws:s3:::iata-data-lake-demo/*

  PythonLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: !Ref LambdaRuntime
      Handler: !Ref LambdaHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 2048

      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key

      Environment:
        Variables:
          ENV: dev
      Layers:
        - !Ref PandasLayer
          
  PandasLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: demo-1
      Description: libraries
      Content:
        S3Bucket: iata-data-lake-demo
        S3Key: layers/requests.zip
      CompatibleRuntimes:
        - python3.12
        - python3.11

Outputs:
  LambdaName:
    Value: !Ref PythonLambda

  LambdaArn:
    Value: !GetAtt PythonLambda.Arn